<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#6366F1">
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="apple-touch-icon" href="logo.png">
  <title>FinanzasJuntos</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #F9FAFB; --surface: #FFFFFF; --surface2: #F3F4F6; --border: #E5E7EB;
      --text1: #111827; --text2: #6B7280; --text3: #9CA3AF;
      --accent: #6366F1; --red: #EF4444; --red-bg: #FEF2F2;
      --shadow: 0 1px 3px rgba(0,0,0,0.07); --shadow-md: 0 4px 6px rgba(0,0,0,0.07);
    }
    .dark {
      --bg: #0F1117; --surface: #1C1F2A; --surface2: #252836; --border: #2D3148;
      --text1: #F3F4F6; --text2: #A0A8C0; --text3: #6B7280;
    }
    html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text1); }
    #wrap { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 24px; }
    .logo  { font-size: 52px; text-align: center; margin-bottom: 8px; }
    .title { font-size: 28px; font-weight: 700; text-align: center; color: var(--text1); }
    .sub   { font-size: 14px; color: var(--text3); text-align: center; margin-bottom: 32px; }
    .card  { width: 100%; max-width: 400px; background: var(--surface); border-radius: 20px; padding: 28px; box-shadow: var(--shadow-md); }
    .tabs  { display: flex; background: var(--surface2); border-radius: 10px; padding: 4px; margin-bottom: 24px; }
    .tab   { flex: 1; padding: 8px; text-align: center; border-radius: 8px; font-size: 14px; font-weight: 600; color: var(--text3); cursor: pointer; border: none; background: none; font-family: inherit; transition: all 0.2s; }
    .tab.active { background: var(--surface); color: var(--text1); box-shadow: var(--shadow); }
    .lbl   { display: block; font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 6px; }
    .fg    { margin-bottom: 16px; }
    input  { width: 100%; padding: 11px 14px; border-radius: 10px; border: 1.5px solid var(--border); background: var(--surface2); color: var(--text1); font-size: 15px; font-family: inherit; outline: none; }
    input:focus { border-color: var(--accent); }
    input::placeholder { color: var(--text3); }
    .btn   { display: flex; align-items: center; justify-content: center; width: 100%; padding: 13px; background: var(--accent); color: white; border: none; border-radius: 14px; font-size: 15px; font-weight: 600; font-family: inherit; cursor: pointer; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .err   { display: none; margin-top: 12px; padding: 10px 14px; background: var(--red-bg); color: var(--red); border-radius: 10px; font-size: 13px; text-align: center; }
    .spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #dbg-btn { position: fixed; bottom: 20px; right: 20px; z-index: 9999; background: #1e1b4b; color: white; border-radius: 50%; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; box-shadow: 0 4px 14px rgba(0,0,0,0.5); }
    #dbg-panel { display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 9998; background: #0a0a0a; color: #00ff88; font-family: monospace; font-size: 12px; max-height: 50vh; overflow-y: auto; border-top: 2px solid #6366f1; }
    #dbg-hdr { position: sticky; top: 0; background: #0a0a0a; display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; border-bottom: 1px solid #222; }
    #dbg-hdr span { color: #818cf8; font-weight: bold; }
    #dbg-hdr button { background: #333; color: #ccc; border: none; border-radius: 6px; padding: 4px 12px; cursor: pointer; font-size: 11px; font-family: monospace; }
    #dbg-log { padding: 6px 12px 20px; }
    .dl { padding: 3px 0; border-bottom: 1px solid #111; word-break: break-all; white-space: pre-wrap; }
    .dl-log { color: #00ff88; } .dl-error { color: #ff4444; } .dl-warn { color: #ffaa00; } .dl-info { color: #60a5fa; }
  </style>
</head>
<body>

<div id="wrap">
  <div class="logo">&#x1F491;</div>
  <h1 class="title">FinanzasJuntos</h1>
  <p class="sub">Manejá tus finanzas en pareja</p>
  <div class="card">
    <div class="tabs">
      <button class="tab active" id="tab-login"    onclick="switchTab('login')">Iniciar sesión</button>
      <button class="tab"        id="tab-register" onclick="switchTab('register')">Registrarse</button>
    </div>
    <div id="form-login">
      <div class="fg"><label class="lbl">Email</label>
        <input id="l-email" type="email" placeholder="tu@email.com"></div>
      <div class="fg"><label class="lbl">Contraseña</label>
        <input id="l-pass" type="password" placeholder="••••••••"></div>
      <button class="btn" id="btn-login" onclick="doLogin()">Ingresar</button>
      <p class="err" id="err-login"></p>
    </div>
    <div id="form-register" style="display:none;">
      <div class="fg"><label class="lbl">Tu nombre</label>
        <input id="r-name" type="text" placeholder="Carlos"></div>
      <div class="fg"><label class="lbl">Email</label>
        <input id="r-email" type="email" placeholder="tu@email.com"></div>
      <div class="fg"><label class="lbl">Contraseña</label>
        <input id="r-pass" type="password" placeholder="Min. 6 caracteres"></div>
      <button class="btn" id="btn-register" onclick="doRegister()">Crear cuenta</button>
      <p class="err" id="err-register"></p>
    </div>
  </div>
</div>

<div id="dbg-btn" onclick="toggleDbg()">&#x1F41B;</div>
<div id="dbg-panel">
  <div id="dbg-hdr">
    <span>CONSOLA DEBUG</span>
    <button onclick="document.getElementById('dbg-log').innerHTML=''">Limpiar</button>
  </div>
  <div id="dbg-log"></div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
(function() {
  function dbgLine(type, args) {
    var log = document.getElementById('dbg-log');
    if (!log) return;
    var msg = Array.from(args).map(function(a) {
      if (a instanceof Error) return a.message;
      try { return typeof a === 'object' ? JSON.stringify(a) : String(a); }
      catch(e) { return '[objeto]'; }
    }).join(' ');
    var t = new Date().toLocaleTimeString('es');
    var d = document.createElement('div');
    d.className = 'dl dl-' + type;
    d.textContent = '[' + t + '] ' + type.toUpperCase() + ': ' + msg;
    log.appendChild(d);
    log.scrollTop = log.scrollHeight;
    if (type === 'error') document.getElementById('dbg-panel').style.display = 'block';
  }
  ['log','error','warn','info'].forEach(function(t) {
    var o = console[t].bind(console);
    console[t] = function() { o.apply(console, arguments); dbgLine(t, arguments); };
  });
  window.addEventListener('error', function(e) {
    dbgLine('error', [e.message + ' ' + (e.filename||'').split('/').pop() + ':' + e.lineno]);
  });
  window.addEventListener('unhandledrejection', function(e) {
    dbgLine('error', ['Unhandled: ' + (e.reason && e.reason.message ? e.reason.message : String(e.reason))]);
  });
})();

window.toggleDbg = function() {
  var p = document.getElementById('dbg-panel');
  p.style.display = p.style.display === 'none' ? 'block' : 'none';
};

window.addEventListener('load', function() {
  console.log('load event fired');

  if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.classList.add('dark');
  }

  if (typeof supabase === 'undefined') {
    console.error('supabase lib no disponible');
    return;
  }
  console.log('supabase lib OK');

  var sb;
  try {
    sb = supabase.createClient(
      'https://kidczvzfmhkdzxigfntz.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtpZGN6dnpmbWhrZHp4aWdmbnR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyOTExNTQsImV4cCI6MjA4ODg2NzE1NH0.gNWpp_PxjFlSeYzHNWzujD1UQfdK8ocaHgNswy8atxU'
    );
    console.log('sb client OK');
  } catch(e) {
    console.error('createClient failed: ' + e.message);
    return;
  }

  sb.auth.getSession().then(function(r) {
    if (r.error) { console.error('getSession error: ' + r.error.message); return; }
    if (r.data && r.data.session) { window.location.href = 'app.html'; }
    else { console.log('no session, showing login'); }
  }).catch(function(e) { console.error('getSession exception: ' + e.message); });

  window.switchTab = function(tab) {
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-register').classList.toggle('active', tab === 'register');
    document.getElementById('form-login').style.display    = tab === 'login'    ? 'block' : 'none';
    document.getElementById('form-register').style.display = tab === 'register' ? 'block' : 'none';
  };

  function setBtn(id, loading) {
    var b = document.getElementById(id);
    b.disabled = loading;
    b.innerHTML = loading ? '<div class="spinner"></div>' : (id === 'btn-login' ? 'Ingresar' : 'Crear cuenta');
  }
  function showErr(id, msg) { var e = document.getElementById(id); e.textContent = msg; e.style.display = 'block'; }
  function hideErr(id) { document.getElementById(id).style.display = 'none'; }

  window.doLogin = async function() {
    var email = document.getElementById('l-email').value.trim();
    var pass  = document.getElementById('l-pass').value;
    hideErr('err-login');
    if (!email || !pass) { showErr('err-login', 'Ingresa email y contraseña'); return; }
    setBtn('btn-login', true);
    console.log('login attempt: ' + email);
    try {
      var r = await sb.auth.signInWithPassword({ email: email, password: pass });
      console.log('login result error=' + (r.error ? r.error.message : 'none') + ' session=' + !!(r.data && r.data.session));
      if (r.error) { showErr('err-login', 'Email o contraseña incorrectos: ' + r.error.message); setBtn('btn-login', false); return; }
      if (r.data && r.data.session) { window.location.href = 'app.html'; }
      else { showErr('err-login', 'Sin sesión en respuesta'); setBtn('btn-login', false); }
    } catch(e) { console.error('login exception: ' + e.message); showErr('err-login', e.message); setBtn('btn-login', false); }
  };

  window.doRegister = async function() {
    var name  = document.getElementById('r-name').value.trim();
    var email = document.getElementById('r-email').value.trim();
    var pass  = document.getElementById('r-pass').value;
    hideErr('err-register');
    if (!name || !email || !pass) { showErr('err-register', 'Completa todos los campos'); return; }
    if (pass.length < 6) { showErr('err-register', 'Contraseña: mínimo 6 caracteres'); return; }
    setBtn('btn-register', true);
    console.log('register attempt: ' + email);
    try {
      var r = await sb.auth.signUp({ email: email, password: pass, options: { data: { name: name } } });
      console.log('register result error=' + (r.error ? r.error.message : 'none') + ' user=' + !!(r.data && r.data.user));
      if (r.error) { showErr('err-register', r.error.message); setBtn('btn-register', false); return; }
      if (r.data && r.data.user) { window.location.href = 'onboarding.html'; }
      else { showErr('err-register', 'Verifica tu email para confirmar.'); setBtn('btn-register', false); }
    } catch(e) { console.error('register exception: ' + e.message); showErr('err-register', e.message); setBtn('btn-register', false); }
  };

});
</script>
</body>
</html>
